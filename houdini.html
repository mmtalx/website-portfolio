<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Houdini — Esra Sitepu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

  /* ============================================
     RESET & BASE
  ============================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background-color: #000000;
    font-family: 'Manrope', Arial, Helvetica, sans-serif;
    color: #ffffff;
    overflow-x: hidden;
    overflow-y: auto;
    cursor: none;
  }

  a, button, video, img {
    cursor: none;
  }

  /* ============================================
     CUSTOM CURSOR — difference-blended orange dot
  ============================================ */
  .custom-cursor {
    position: fixed;
    top: 0;
    left: 0;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background-color: #d9531e;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
  }

  /* ============================================
     NAMEPLATE
  ============================================ */
  .nameplate {
    position: fixed;
    top: 30px;
    left: 100px;
    z-index: 100;
    perspective: 500px;
  }

  .nameplate__cube {
    position: relative;
    width: 210px;
    height: 22px;
    transform-style: preserve-3d;
    transform: rotateX(0deg);
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .nameplate:hover .nameplate__cube {
    transform: rotateX(-90deg);
  }

  .nameplate__face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    backface-visibility: hidden;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    white-space: nowrap;
    font-size: 13px;
    letter-spacing: 1.5px;
  }

  .nameplate__face--name {
    color: #ffffff;
    transform: rotateX(0deg) translateZ(11px);
  }

  .nameplate__face--title {
    color: #d9531e;
    text-transform: none;
    transform: rotateX(90deg) translateZ(11px);
    letter-spacing: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .nameplate__cube {
      transition: none;
    }
  }

  /* ============================================
     NAVIGATION
  ============================================ */
  .nav {
    position: fixed;
    top: 30px;
    right: 100px;
    z-index: 100;
  }

  .nav__list {
    display: flex;
    gap: 0;
    list-style: none;
    background-color: #000000;
    backdrop-filter: blur(4px);
  }

  .nav__item {
    margin: 0;
  }

  .nav__link {
    display: block;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    color: #ffffff;
    white-space: nowrap;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 40px;
    line-height: 1;
    position: relative;
    transition: background-color 0.25s ease;
  }

  .nav__link::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 48px;
    transform: translateY(-50%);
  }

  .nav__link:hover {
    background-color: rgba(255, 255, 255, 0.08);
  }

  .nav__link.is-active {
    background-color: #ffffff;
    color: #000000;
  }

  /* ============================================
     HOUDINI GRID — 2x2 interactive project grid
  ============================================ */
  .houdini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px; /* Creates the black dividing lines */
    padding-top: 120px; /* Clears the fixed header's physical height + visual gap */
    background-color: #000000;
    width: 78%;
    max-width: 1440px;
    margin: 0 auto;
    align-content: start;
    box-sizing: border-box;
  }

  .houdini-item {
    position: relative;
    aspect-ratio: 1920 / 1080;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    padding: 3vw; /* Responsive inner padding */
    margin: 0;
    text-decoration: none;
    overflow: hidden;
    cursor: none;
  }

  .houdini-item__bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    object-fit: cover;
    /* Replace background-color with background-image or video when assets are ready */
  }

  .houdini-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background-color: rgba(0, 0, 0, 0.4);
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .houdini-item:hover::after {
    opacity: 1;
  }

  .houdini-item__text {
    position: relative;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
    color: #e6e6e6;
  }

  .houdini-item:hover .houdini-item__text {
    opacity: 1;
  }

  .houdini-item__category {
    display: block;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .houdini-item__title {
    display: block;
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    font-size: 35px;
    letter-spacing: 0;
    line-height: 1.1;
    margin-top: 0;
  }

</style>
</head>
<body>

  <div class="custom-cursor"></div>

  <!-- Nameplate — fixed top-left -->
  <a href="/" class="nameplate" aria-label="Esra Sitepu, 3D Generalist">
    <div class="nameplate__cube">
      <span class="nameplate__face nameplate__face--name">Esra Sitepu</span>
      <span class="nameplate__face nameplate__face--title">3D Generalist</span>
    </div>
  </a>

  <!-- Navigation — fixed top-right, HOUDINI active -->
  <nav class="nav">
    <ul class="nav__list">
      <li class="nav__item"><a href="/houdini" class="nav__link is-active">HOUDINI</a></li>
      <li class="nav__item"><a href="/unrealengine" class="nav__link">UNREAL ENGINE</a></li>
      <li class="nav__item"><a href="/" class="nav__link">ABOUT</a></li>
    </ul>
  </nav>

  <main class="houdini-grid">

    <!-- Box 1 -->
    <a href="/grandairy" class="houdini-item">
      <img class="houdini-item__bg" src="assets/grandairy/thumbnail_grandairy.png" alt="Grandairy Project Thumbnail">
      <div class="houdini-item__text">
        <span class="houdini-item__category">COMMERCIAL - FREELANCE</span>
        <h2 class="houdini-item__title">Grandairy</h2>
      </div>
    </a>
    <!-- Box 2 -->
    <a href="/candle" class="houdini-item">
      <img class="houdini-item__bg" src="assets/candle/thumbnail_candle.png" alt="Candle Project Thumbnail">
      <div class="houdini-item__text">
        <span class="houdini-item__category">PERSONAL PROJECT</span>
        <h2 class="houdini-item__title">Candle</h2>
      </div>
    </a>
    <!-- Box 3 -->
    <a href="/machine" class="houdini-item">
      <img class="houdini-item__bg" src="assets/machine/thumbnail_machine.png" alt="Machine Project Thumbnail">
      <div class="houdini-item__text">
        <span class="houdini-item__category">PERSONAL PROJECT</span>
        <h2 class="houdini-item__title">Machine</h2>
      </div>
    </a>
    <!-- Box 4 -->
    <a href="/tool-development" class="houdini-item">
      <img class="houdini-item__bg" src="assets/tool-development/thumbnail_tool_development.png" alt="Tool Development Thumbnail">
      <div class="houdini-item__text">
        <span class="houdini-item__category">PERSONAL PROJECT</span>
        <h2 class="houdini-item__title">Tool Development</h2>
      </div>
    </a>

  </main>

  <script>

    /* ============================================
       CUSTOM CURSOR — hardware-accelerated tracking
    ============================================ */
    const cursor = document.querySelector('.custom-cursor');

    window.addEventListener('mousemove', (e) => {
      cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
    });

  </script>

</body>
</html>
